
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile        on;

  # Get real IP from ALB
  # Set this to your ALB's IP range or VPC CIDR
  # For AWS, you can use the entire private IP ranges or be more specific
  set_real_ip_from ${NGINX_VPC_CIDR_BLOCK};

  # Read the real client IP from X-Forwarded-For header
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # Define rate limit zone
  # 10m zone can hold ~160k IP addresses
  # Rate: 1 request per second per IP

  log_format  main  '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"'
                  '$request_time';


  map $http_upgrade $connection_upgrade {
    default     "upgrade";
  }

  limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=${NGINX_RATE_LIMIT_PER_SECOND}r/s;
  include /etc/nginx/conf.d/00_appserver.conf;
}